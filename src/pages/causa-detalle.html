<!DOCTYPE html>
<html lang="es" class="light">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Detalle de Causa | SOFSE SACO</title>
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>
tailwind.config = {
  theme: { extend: {
    colors: {
      "primary":"#256386","primary-dim":"#1d4e6b","primary-container":"#c5e0ea","on-primary":"#ffffff","on-primary-container":"#1b3a5c","on-primary-fixed":"#0f2a42",
      "secondary":"#3a70a9","secondary-container":"#dbeafe","on-secondary-fixed":"#1e3a5f","secondary-dim":"#2d5987",
      "tertiary":"#6d8eb0","tertiary-container":"#e0e7ef","on-tertiary-fixed":"#3a4f6a","tertiary-dim":"#5a7a9e",
      "surface":"#f0f7f8","surface-container-lowest":"#ffffff","surface-container-low":"#f0f7f8","surface-container":"#e2eff5","surface-container-high":"#d4e6ef","surface-container-highest":"#c5dde9",
      "background":"#f0f7f8","on-background":"#1b3a5c","on-surface":"#1b3a5c","on-surface-variant":"#4f6080",
      "outline":"#6d8eb0","outline-variant":"#bcc0c9",
      "error":"#cd5055","error-container":"#fee2e2","on-error-container":"#7f1d1d",
      "inverse-surface":"#1b3a5c",
      "header":"#242D4F",
    },
    fontFamily: { "headline":["Public Sans","sans-serif"], "body":["Inter","sans-serif"] },
    borderRadius: { DEFAULT:"0.125rem","sm":"0.25rem","lg":"0.5rem","xl":"0.75rem","2xl":"1rem","full":"9999px" },
  }}
}
</script>
<style>
  .material-symbols-outlined { font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24; vertical-align:middle; }
  body { font-family:'Inter',sans-serif; }
  h1,h2,h3,h4 { font-family:'Public Sans',sans-serif; }
  .shadow-card { box-shadow:0 1px 3px rgba(27,58,92,0.08),0 1px 2px rgba(27,58,92,0.04); }
  .shadow-card-lg { box-shadow:0 12px 40px rgba(27,58,92,0.08); }

  /* Timeline */
  .tl-line { position:absolute; left:19px; top:28px; bottom:0; width:2px; background:#e2eff5; }
  .tl-dot  { position:absolute; left:12px; top:6px; width:16px; height:16px; border-radius:50%; background:#c5e0ea; border:2px solid #256386; }
  .tl-dot.activo { background:#256386; }

  /* Exp card hover */
  .exp-card { transition:box-shadow 0.15s, transform 0.15s; }
  .exp-card:hover { box-shadow:0 4px 16px rgba(27,58,92,0.12); transform:translateY(-1px); }

  /* Area color pills */
  .pill-CIVIL    { background:#dbeafe; color:#1e3a5f; }
  .pill-LABORAL  { background:#dcfce7; color:#14532d; }
  .pill-PENAL    { background:#fef3c7; color:#78350f; }
</style>
</head>
<body class="bg-[#f0f7f8] text-[#1b3a5c]">

<div id="sidebar-mount"></div>
<div id="topbar-mount"></div>

<main id="main-content" class="min-h-screen" style="padding-top:64px;margin-left:256px">
<div class="p-8 max-w-[1400px] mx-auto">

  <!-- ── Header ────────────────────────────────────────────────────── -->
  <div class="flex items-center gap-3 mb-2">
    <button onclick="history.back()"
      class="w-8 h-8 flex items-center justify-center rounded-lg hover:bg-[#e2eff5] transition-colors text-[#4f6080]"
      title="Volver">
      <span class="material-symbols-outlined text-xl">arrow_back</span>
    </button>
    <div>
      <p class="text-[10px] font-black uppercase tracking-widest text-[#4f6080] mb-0.5">N° Causa judicial</p>
      <h2 class="font-headline text-2xl font-extrabold tracking-tight text-[#1b3a5c]" id="causa-title">—</h2>
    </div>
  </div>
  <p class="text-[#4f6080] text-sm mb-6 ml-11" id="causa-subtitle">Cargando expedientes...</p>

  <!-- ── Grilla de expedientes ─────────────────────────────────────── -->
  <div class="mb-7">
    <p class="text-[10px] font-black uppercase tracking-widest text-[#4f6080] mb-3">Expedientes vinculados a esta causa</p>
    <div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-4" id="exp-cards"></div>
  </div>

  <!-- ── Panel timeline unificado ──────────────────────────────────── -->
  <div class="bg-white rounded-2xl shadow-card overflow-hidden">

    <!-- Header del timeline -->
    <div class="px-6 pt-5 pb-4 border-b border-[#e2eff5]">

      <!-- Título + botón Nueva Actividad -->
      <div class="flex items-center justify-between mb-4">
        <h3 class="font-headline font-bold text-[#1b3a5c]">Historial completo de la causa</h3>
        <button onclick="abrirModalNuevaActividad()"
          class="inline-flex items-center gap-2 px-4 py-2 bg-[#256386] hover:bg-[#1d4e6b] text-white text-sm font-bold rounded-xl shadow-sm hover:shadow-md active:scale-[0.98] transition-all">
          <span class="material-symbols-outlined text-[16px]">add_circle</span>
          Nueva Actividad
        </button>
      </div>

      <!-- Tres filtros combinables -->
      <div class="flex flex-wrap items-center gap-3">

        <!-- Filtro Expediente -->
        <div class="relative">
          <select id="filtro-exp"
            onchange="renderTimelineUnificado()"
            class="bg-[#f0f7f8] border border-[#bcc0c9] rounded-lg py-2 pl-3 pr-8 text-sm focus:ring-2 focus:ring-[#256386]/20 focus:outline-none appearance-none cursor-pointer min-w-[180px]">
            <option value="">Expediente: Todos</option>
          </select>
          <span class="material-symbols-outlined absolute right-2 top-1/2 -translate-y-1/2 text-[#4f6080] text-[16px] pointer-events-none">expand_more</span>
        </div>

        <!-- Filtro Tipo de documento -->
        <div class="relative">
          <select id="filtro-tipo"
            onchange="renderTimelineUnificado()"
            class="bg-[#f0f7f8] border border-[#bcc0c9] rounded-lg py-2 pl-3 pr-8 text-sm focus:ring-2 focus:ring-[#256386]/20 focus:outline-none appearance-none cursor-pointer min-w-[180px]">
            <option value="">Tipo: Todos</option>
            <option value="RECEPCION">Recepción</option>
            <option value="NOTA_RESPUESTA">Nota / Respuesta</option>
            <option value="MOVIMIENTO">Movimiento</option>
            <option value="DERIVACION">Derivación</option>
            <option value="CIERRE">Cierre</option>
            <option value="OTRO">Otro</option>
          </select>
          <span class="material-symbols-outlined absolute right-2 top-1/2 -translate-y-1/2 text-[#4f6080] text-[16px] pointer-events-none">expand_more</span>
        </div>

        <!-- Filtro Actividad (texto libre) -->
        <div class="relative flex-1 min-w-[200px]">
          <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-[#4f6080] text-[18px]">search</span>
          <input id="filtro-actividad"
            oninput="renderTimelineUnificado()"
            class="w-full bg-[#f0f7f8] border border-[#bcc0c9] rounded-lg pl-9 pr-3 py-2 text-sm focus:ring-2 focus:ring-[#256386]/20 focus:outline-none"
            placeholder="Buscar por título de actividad..."/>
        </div>

        <!-- Limpiar filtros -->
        <button onclick="limpiarFiltrosCausa()"
          class="text-[10px] font-bold text-[#4f6080] hover:text-[#256386] flex items-center gap-1 transition-colors whitespace-nowrap">
          <span class="material-symbols-outlined text-[14px]">close</span>
          Limpiar
        </button>

      </div>
    </div>

    <!-- Timeline -->
    <div id="timeline-wrap" class="px-6 py-5 space-y-1"></div>

  </div>

</div>
</main>

<script src="../data/mock.js"></script>
<script src="../components/sync.js"></script>
<script src="../components/shared.js"></script>
<script>
// ── Inicialización ────────────────────────────────────────────────────
document.getElementById('sidebar-mount').innerHTML = SACO_UI.renderSidebar('bandeja-abogado');

const params      = new URLSearchParams(window.location.search);
const numeroCausa = params.get('causa') || '';

document.getElementById('topbar-mount').innerHTML =
  SACO_UI.renderTopbar('Detalle de Causa', `Mi Bandeja / ${numeroCausa || 'Causa'}`);

// ── Datos ─────────────────────────────────────────────────────────────
const expedientes = numeroCausa
  ? window.SACO.EXPEDIENTES_ABOGADO.filter(e => e.numero_causa === numeroCausa)
  : [];
const expsDeCausa = expedientes;

// ── Header ────────────────────────────────────────────────────────────
document.getElementById('causa-title').textContent = numeroCausa || 'Sin número de causa';

const areas = [...new Set(expedientes.map(e => e.area))].join(' · ');
document.getElementById('causa-subtitle').textContent =
  expedientes.length === 0
    ? 'No se encontraron expedientes para esta causa.'
    : `${expedientes.length} expediente${expedientes.length !== 1 ? 's' : ''} activo${expedientes.length !== 1 ? 's' : ''} — ${areas}`;

// ── Helpers ───────────────────────────────────────────────────────────
const AREA_LABELS = { CIVIL:'Civil', LABORAL:'Laboral', PENAL:'Penal' };
const TIPO_ICONS  = {
  RECEPCION:'inbox', DERIVACION:'forward', MEMO_ENVIADO:'send',
  NOTA_RESPUESTA:'reply', PRORROGA:'schedule', CIERRE:'task_alt', OTRO:'notes',
};

function areaBadgeHTML(area) {
  return `<span class="pill-${area} text-[10px] font-black uppercase tracking-widest px-2 py-0.5 rounded-full">${AREA_LABELS[area] || area}</span>`;
}

function estadoBadgeHTML(label) {
  return `<span class="bg-[#e2eff5] text-[#1b3a5c] text-[10px] font-bold px-2 py-0.5 rounded-full">${label}</span>`;
}

// ── Render tarjetas de expedientes ────────────────────────────────────
function renderCards() {
  const wrap = document.getElementById('exp-cards');
  if (expedientes.length === 0) {
    wrap.innerHTML = `<p class="col-span-3 text-sm text-[#4f6080] italic">No hay expedientes asociados a esta causa.</p>`;
    return;
  }
  wrap.innerHTML = expedientes.map(exp => {
    const alertaHTML = exp.tiene_alerta
      ? `<div class="mt-3 flex items-start gap-2 bg-[#fee2e2] rounded-lg px-3 py-2 text-xs text-[#7f1d1d]">
           <span class="material-symbols-outlined text-base leading-none mt-0.5" style="font-variation-settings:'FILL' 1">warning</span>
           <span>${exp.alerta_msg}</span>
         </div>`
      : '';
    return `
    <div class="exp-card bg-white rounded-xl shadow-card p-4 cursor-pointer"
         onclick="window.SACO.abrirExpediente('${exp.id}')">
      <div class="flex items-start justify-between gap-2 mb-2">
        <div class="flex items-center gap-2 flex-wrap">
          ${areaBadgeHTML(exp.area)}
          ${estadoBadgeHTML(exp.estadoLabel || exp.estado)}
        </div>
        <span class="material-symbols-outlined text-[#4f6080] text-base flex-shrink-0">open_in_new</span>
      </div>
      <p class="text-[10px] font-mono text-[#4f6080] mb-1">${exp.id}</p>
      <p class="text-sm font-semibold text-[#1b3a5c] leading-snug mb-3 line-clamp-2">${exp.caratula}</p>
      <div class="flex flex-wrap gap-x-4 gap-y-1 text-xs text-[#4f6080]">
        <span class="flex items-center gap-1">
          <span class="material-symbols-outlined text-sm">gavel</span>
          ${exp.tipo.replace(/_/g,' ')}
        </span>
        <span class="flex items-center gap-1">
          <span class="material-symbols-outlined text-sm">calendar_today</span>
          ${exp.fecha_recepcion}
        </span>
        ${exp.abogado ? `<span class="flex items-center gap-1">
          <span class="material-symbols-outlined text-sm">person</span>
          ${exp.abogado}
        </span>` : ''}
      </div>
      ${alertaHTML}
    </div>`;
  }).join('');
}

// ── Render select de filtro ───────────────────────────────────────────
function poblarFiltroExp() {
  const filtroExpSel = document.getElementById('filtro-exp');
  expsDeCausa.forEach(e => {
    const opt = document.createElement('option');
    opt.value = e.id;
    opt.textContent = `${e.id} — ${e.tipo.replace(/_/g,' ')}`;
    filtroExpSel.appendChild(opt);
  });
}

function limpiarFiltrosCausa() {
  document.getElementById('filtro-exp').value       = '';
  document.getElementById('filtro-tipo').value      = '';
  document.getElementById('filtro-actividad').value = '';
  renderTimelineUnificado();
}

// ── Construir entradas filtradas del timeline ─────────────────────────
function buildTimelineUnificado() {
  const filtroExp       = document.getElementById('filtro-exp').value;
  const filtroTipo      = document.getElementById('filtro-tipo').value;
  const filtroActividad = (document.getElementById('filtro-actividad').value || '').toLowerCase().trim();

  const exps = filtroExp
    ? expsDeCausa.filter(e => e.id === filtroExp)
    : expsDeCausa;

  const movimientos = [];
  exps.forEach(exp => {
    (exp.timeline || []).forEach(mov => {
      if (filtroTipo && mov.tipo !== filtroTipo) return;
      if (filtroActividad && !(mov.titulo || '').toLowerCase().includes(filtroActividad)) return;
      movimientos.push({
        ...mov,
        _expId:       exp.id,
        _expArea:     exp.area,
        _expTipo:     exp.tipo,
        _expCaratula: exp.caratula,
      });
    });
  });

  movimientos.sort((a, b) => {
    if (a.activo && !b.activo) return -1;
    if (!a.activo && b.activo) return 1;
    return (b.fecha || '').localeCompare(a.fecha || '');
  });

  return movimientos;
}

// ── Render timeline ───────────────────────────────────────────────────
function renderTimelineUnificado() {
  const wrap    = document.getElementById('timeline-wrap');
  const entradas = buildTimelineUnificado();

  if (entradas.length === 0) {
    wrap.innerHTML = `<p class="text-sm text-[#4f6080] italic py-4">No hay movimientos para mostrar.</p>`;
    return;
  }

  wrap.innerHTML = entradas.map((t, idx) => {
    const icon  = TIPO_ICONS[t.tipo] || 'notes';
    const esUlt = idx === entradas.length - 1;
    return `
    <div class="relative pl-10 pb-6">
      ${!esUlt ? `<div class="tl-line"></div>` : ''}
      <div class="tl-dot ${t.activo ? 'activo' : ''}"></div>
      <div class="bg-white border border-[#e2eff5] rounded-xl px-4 py-3 shadow-card">
        <div class="flex flex-wrap items-center gap-2 mb-2">
          ${areaBadgeHTML(t._expArea)}
          <span class="text-[10px] font-mono text-[#4f6080]">${t._expId}</span>
          <span class="text-[10px] text-[#4f6080] italic truncate max-w-[260px]">${t._expCaratula}</span>
          ${t.activo ? `<span class="ml-auto text-[10px] font-black uppercase tracking-widest text-[#256386]">Activo</span>` : ''}
        </div>
        <div class="flex items-start gap-3">
          <span class="material-symbols-outlined text-[#6d8eb0] text-lg mt-0.5 flex-shrink-0">${icon}</span>
          <div class="flex-1 min-w-0">
            <div class="flex items-baseline gap-2 flex-wrap mb-0.5">
              <p class="font-semibold text-sm text-[#1b3a5c]">${t.titulo}</p>
              <p class="text-[10px] text-[#4f6080]">${t.fecha}</p>
            </div>
            ${t.desc ? `<p class="text-xs text-[#4f6080] leading-relaxed">${t.desc}</p>` : ''}
            ${t.doc ? `<p class="mt-1.5 flex items-center gap-1 text-xs font-mono text-[#256386]">
              <span class="material-symbols-outlined text-sm">attach_file</span>${t.doc}
            </p>` : ''}
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ── Modal Nueva Actividad ─────────────────────────────────────────────
const TIPOS_MOVIMIENTO = [
  { value: 'RECEPCION',      label: 'Recepción' },
  { value: 'NOTA_RESPUESTA', label: 'Nota / Respuesta' },
  { value: 'MOVIMIENTO',     label: 'Movimiento' },
  { value: 'DERIVACION',     label: 'Derivación' },
  { value: 'CIERRE',         label: 'Cierre' },
  { value: 'OTRO',           label: 'Otro' },
];

function abrirModalNuevaActividad() {
  SACO_UI.showModal('Nueva Actividad', `
    <div class="space-y-4">

      <div>
        <label class="block text-xs font-bold text-[#4f6080] uppercase tracking-wider mb-2">Expediente destino *</label>
        <select id="nav-exp-destino"
          class="w-full bg-[#f0f7f8] border border-[#bcc0c9] rounded-lg py-3 px-4 text-sm focus:ring-2 focus:ring-[#256386]/20 focus:outline-none">
          <option value="">— Seleccioná el expediente —</option>
          ${expsDeCausa.map(e => `
            <option value="${e.id}">${e.id} — ${e.tipo.replace(/_/g,' ')} (${e.area})${e.es_principal ? ' ★ Principal' : ''}</option>`).join('')}
        </select>
        <p class="text-[10px] text-[#4f6080] mt-1">La actividad se registrará en el timeline del expediente seleccionado.</p>
      </div>

      <div>
        <label class="block text-xs font-bold text-[#4f6080] uppercase tracking-wider mb-2">Tipo de actividad *</label>
        <select id="nav-tipo"
          class="w-full bg-[#f0f7f8] border border-[#bcc0c9] rounded-lg py-3 px-4 text-sm focus:ring-2 focus:ring-[#256386]/20 focus:outline-none">
          <option value="">— Seleccioná el tipo —</option>
          ${TIPOS_MOVIMIENTO.map(t => `<option value="${t.value}">${t.label}</option>`).join('')}
        </select>
      </div>

      <div>
        <label class="block text-xs font-bold text-[#4f6080] uppercase tracking-wider mb-2">Fecha del movimiento</label>
        <input type="date" id="nav-fecha"
          value="${new Date().toISOString().split('T')[0]}"
          class="w-full bg-[#f0f7f8] border border-[#bcc0c9] rounded-lg py-3 px-4 text-sm focus:ring-2 focus:ring-[#256386]/20 focus:outline-none"/>
      </div>

      <div>
        <label class="block text-xs font-bold text-[#4f6080] uppercase tracking-wider mb-2">Descripción *</label>
        <textarea id="nav-desc" rows="3"
          class="w-full bg-[#f0f7f8] border border-[#bcc0c9] rounded-lg py-3 px-4 text-sm resize-none focus:ring-2 focus:ring-[#256386]/20 focus:outline-none"
          placeholder="Descripción del movimiento..."></textarea>
      </div>

      <div>
        <label class="block text-xs font-bold text-[#4f6080] uppercase tracking-wider mb-2">N° Documento GDE <span class="font-normal normal-case text-[#4f6080]">(opcional)</span></label>
        <input type="text" id="nav-gde"
          class="w-full bg-[#f0f7f8] border border-[#bcc0c9] rounded-lg py-3 px-4 text-sm font-mono focus:ring-2 focus:ring-[#256386]/20 focus:outline-none"
          placeholder="IF-2026-XXXXXXX-APN-SACO#SOFSE"/>
      </div>

      <div>
        <label class="block text-xs font-bold text-[#4f6080] uppercase tracking-wider mb-2">Archivo adjunto <span class="font-normal normal-case text-[#4f6080]">(opcional)</span></label>
        <div id="nav-dropzone"
          class="border-2 border-dashed border-[#bcc0c9] rounded-lg p-4 text-center hover:border-[#256386]/40 hover:bg-[#f0f7f8]/50 transition-all cursor-pointer"
          onclick="document.getElementById('nav-file-input').click()">
          <span class="material-symbols-outlined text-2xl text-[#bcc0c9] mb-1 block">upload_file</span>
          <p class="text-xs text-[#4f6080]">Click para seleccionar — PDF o DOCX hasta 25MB</p>
          <p id="nav-file-name" class="text-xs font-bold text-[#256386] mt-1 hidden"></p>
        </div>
        <input type="file" id="nav-file-input" class="hidden" accept=".pdf,.docx"
          onchange="onNavFileSelected(this)"/>
      </div>

    </div>`,
    `<button onclick="SACO_UI.closeModal()"
      class="px-4 py-2 text-sm font-semibold text-[#4f6080] hover:bg-[#f0f7f8] rounded-lg transition-colors">
      Cancelar
    </button>
    <button onclick="guardarNuevaActividad()"
      class="px-6 py-2 bg-[#256386] hover:bg-[#1d4e6b] text-white text-sm font-bold rounded-lg transition-colors">
      Guardar Actividad
    </button>`
  );
}

let navFileSelected = null;

function onNavFileSelected(input) {
  const f = input.files[0];
  if (!f) return;
  if (f.size > 25 * 1024 * 1024) {
    SACO_UI.showToast('El archivo supera 25MB.', 'warn');
    return;
  }
  navFileSelected = f;
  const nameEl = document.getElementById('nav-file-name');
  if (nameEl) { nameEl.textContent = f.name; nameEl.classList.remove('hidden'); }
}

function guardarNuevaActividad() {
  const expId = document.getElementById('nav-exp-destino').value;
  const tipo  = document.getElementById('nav-tipo').value;
  const fecha = document.getElementById('nav-fecha').value;
  const desc  = document.getElementById('nav-desc').value.trim();
  const gde   = document.getElementById('nav-gde').value.trim();

  if (!expId) { SACO_UI.showToast('Seleccioná el expediente destino.', 'warn'); return; }
  if (!tipo)  { SACO_UI.showToast('Seleccioná el tipo de actividad.', 'warn'); return; }
  if (!desc)  { SACO_UI.showToast('Ingresá una descripción.', 'warn'); return; }

  const expDestino = window.SACO.EXPEDIENTES_ABOGADO.find(e => e.id === expId);
  if (!expDestino) { SACO_UI.showToast('Expediente no encontrado.', 'error'); return; }

  const hora = new Date().toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' });
  const hoy  = new Date().toISOString().split('T')[0];
  const fechaLabel = fecha === hoy
    ? `Hoy · ${hora}`
    : `${fecha.split('-').reverse().join('/')} · ${hora}`;

  const tipoLabel = TIPOS_MOVIMIENTO.find(t => t.value === tipo)?.label || tipo.replace(/_/g,' ');
  const nuevoMov = {
    fecha:            fechaLabel,
    tipo,
    titulo:           tipoLabel.charAt(0).toUpperCase() + tipoLabel.slice(1),
    desc,
    doc:              gde || (navFileSelected ? navFileSelected.name : null),
    activo:           true,
    estadoExpediente: expDestino.estado,
    subMovimientos:   [],
  };

  if (!expDestino.timeline) expDestino.timeline = [];
  expDestino.timeline.forEach(m => m.activo = false);
  expDestino.timeline.unshift(nuevoMov);

  if (navFileSelected) {
    if (!expDestino.documentos) expDestino.documentos = [];
    expDestino.documentos.unshift({
      nombre: navFileSelected.name,
      tipo:   'Adjunto',
      fecha:  new Date().toLocaleDateString('es-AR'),
      size:   `${(navFileSelected.size / 1024).toFixed(0)} KB`,
      icon:   'picture_as_pdf',
      color:  'error',
    });
  }

  if (window.SACO.EXPEDIENTE_DETALLE && window.SACO.EXPEDIENTE_DETALLE.id === expId) {
    window.SACO.EXPEDIENTE_DETALLE.timeline.forEach(m => m.activo = false);
    window.SACO.EXPEDIENTE_DETALLE.timeline.unshift(nuevoMov);
  }

  if (window.SACO_SYNC) {
    SACO_SYNC.syncEmit('MOVIMIENTO_AGREGADO', { expedienteId: expId, movimiento: nuevoMov });
  }

  navFileSelected = null;
  SACO_UI.closeModal();
  renderTimelineUnificado();
  SACO_UI.showToast(`Actividad registrada en ${expId}.`, 'success');
}

// ── Estado vacío ──────────────────────────────────────────────────────
function mostrarEstadoVacio() {
  document.getElementById('exp-cards').innerHTML =
    `<div class="col-span-3 py-8 text-center">
       <span class="material-symbols-outlined text-5xl text-[#bcc0c9] block mb-3">search_off</span>
       <p class="text-[#4f6080] text-sm">No se encontró la causa <strong>${numeroCausa || '—'}</strong>.</p>
       <button onclick="history.back()" class="mt-4 text-sm text-[#256386] underline">Volver a Mi Bandeja</button>
     </div>`;
  document.getElementById('timeline-wrap').innerHTML = '';
}

// ── Iniciar ───────────────────────────────────────────────────────────
if (expedientes.length === 0) {
  mostrarEstadoVacio();
} else {
  renderCards();
  poblarFiltroExp();
  renderTimelineUnificado();
}
</script>
</body>
