<!DOCTYPE html>
<html lang="es" class="light">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Área Laboral | SOFSE SACO</title>
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>
tailwind.config = {
  theme: { extend: {
    colors: {
      "primary":"#256386","primary-dim":"#1d4e6b","primary-container":"#c5e0ea","on-primary":"#ffffff","on-primary-container":"#1b3a5c","on-primary-fixed":"#0f2a42",
      "secondary":"#3a70a9","secondary-container":"#dbeafe","on-secondary-fixed":"#1e3a5f","secondary-dim":"#2d5987",
      "tertiary":"#6d8eb0","tertiary-container":"#e0e7ef","on-tertiary-fixed":"#3a4f6a","tertiary-dim":"#5a7a9e",
      "surface":"#f0f7f8","surface-container-lowest":"#ffffff","surface-container-low":"#f0f7f8","surface-container":"#e2eff5","surface-container-high":"#d4e6ef","surface-container-highest":"#c5dde9",
      "background":"#f0f7f8","on-background":"#1b3a5c","on-surface":"#1b3a5c","on-surface-variant":"#4f6080",
      "outline":"#6d8eb0","outline-variant":"#bcc0c9",
      "error":"#cd5055","error-container":"#fee2e2","on-error-container":"#7f1d1d",
      "inverse-surface":"#1b3a5c",
      "header":"#242D4F",
    },
    fontFamily: { "headline":["Public Sans","sans-serif"], "body":["Inter","sans-serif"] },
    borderRadius: { DEFAULT:"0.125rem","sm":"0.25rem","lg":"0.5rem","xl":"0.75rem","2xl":"1rem","full":"9999px" },
  }}
}
</script>
<style>
  .material-symbols-outlined { font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24; vertical-align:middle; }
  body { font-family:'Inter',sans-serif; }
  h1,h2,h3,h4 { font-family:'Public Sans',sans-serif; }
  .shadow-card { box-shadow:0 1px 3px rgba(27,58,92,0.08),0 1px 2px rgba(27,58,92,0.04); }
  .shadow-card-lg { box-shadow:0 4px 12px rgba(27,58,92,0.1); }
</style>
</head>
<body class="bg-[#f0f7f8] text-[#1b3a5c]">

<div id="sidebar-mount"></div>
<div id="topbar-mount"></div>

<main id="main-content" class="min-h-screen transition-all duration-200" style="padding-top:64px;margin-left:256px">
<div class="p-8 space-y-7">

  <!-- Header -->
  <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
    <div>
      <nav class="flex items-center gap-2 text-xs text-[#4f6080] mb-2 uppercase tracking-wide font-medium">
        <span>SACO</span>
        <span class="material-symbols-outlined text-[12px]">chevron_right</span>
        <span class="text-[#256386]">Área Laboral</span>
      </nav>
      <h1 class="text-2xl font-headline font-bold text-[#1b3a5c]">Coordinación Laboral</h1>
      <p class="text-[#4f6080] text-sm mt-0.5">Demandas laborales, mediaciones y desafueros activos.</p>
    </div>
    <a href="alta-expediente.html" class="inline-flex items-center gap-2 px-5 py-2.5 bg-[#256386] hover:bg-[#1d4e6b] text-white font-bold text-sm rounded-xl shadow-md hover:brightness-105 active:scale-[0.98] transition-all">
      <span class="material-symbols-outlined">add_circle</span>
      Nuevo Expediente Laboral
    </a>
  </div>

  <div class="grid grid-cols-12 gap-7">

    <!-- ── Tabla de expedientes laborales ───────────────────────────────── -->
    <div class="col-span-12 lg:col-span-8 space-y-5">

      <div class="bg-white rounded-xl shadow-sm border border-[#e5e7eb] overflow-hidden">
        <div class="px-6 py-4 border-b border-[#bcc0c9]/40 flex justify-between items-center">
          <div class="flex items-center gap-3">
            <span class="material-symbols-outlined text-[#256386]" style="font-variation-settings:'FILL' 1;">work</span>
            <h2 class="font-headline font-bold text-[#1b3a5c]">Expedientes Laborales Activos</h2>
          </div>
          <span class="text-[10px] font-bold bg-[#e2eff5] text-[#4f6080] px-3 py-1 rounded-full border border-[#bcc0c9]/80" id="laboral-count">0 expedientes</span>
        </div>
        <div class="overflow-x-auto">
          <table class="w-full text-left border-collapse">
            <thead class="bg-[#f0f7f8]">
              <tr>
                <th class="px-6 py-3.5 text-[10px] font-black uppercase tracking-widest text-[#4f6080]">N° Interno</th>
                <th class="px-6 py-3.5 text-[10px] font-black uppercase tracking-widest text-[#4f6080]">Carátula</th>
                <th class="px-6 py-3.5 text-[10px] font-black uppercase tracking-widest text-[#4f6080]">Letrado</th>
                <th class="px-6 py-3.5 text-[10px] font-black uppercase tracking-widest text-[#4f6080]">Tipo</th>
                <th class="px-6 py-3.5 text-[10px] font-black uppercase tracking-widest text-[#4f6080]">Estado</th>
                <th class="px-6 py-3.5 text-[10px] font-black uppercase tracking-widest text-[#4f6080]">Recepción</th>
                <th class="px-6 py-3.5"></th>
              </tr>
            </thead>
            <tbody class="divide-y divide-outline-variant/5" id="laboral-tbody"></tbody>
          </table>
        </div>
      </div>

    </div>

    <!-- ── Sidebar derecho ───────────────────────────────────────────────── -->
    <div class="col-span-12 lg:col-span-4 space-y-5">

      <!-- Letrados Laboral -->
      <div class="bg-white rounded-xl shadow-sm border border-[#e5e7eb] p-5">
        <div class="flex items-center gap-2 mb-5">
          <span class="material-symbols-outlined text-[#256386]">groups</span>
          <h3 class="font-headline font-bold text-[#1b3a5c] text-sm">Letrados — Área Laboral</h3>
        </div>
        <div class="space-y-3" id="letrados-laboral"></div>
        <button onclick="SACO_UI.showToast('Rotación de letrados actualizada.','success')" class="w-full mt-5 py-2 border-2 border-dashed border-[#bcc0c9] rounded-xl text-xs font-bold text-[#4f6080] hover:border-[#256386]/50 hover:text-[#256386] transition-all flex items-center justify-center gap-2">
          <span class="material-symbols-outlined text-[16px]">person_add</span>
          Gestionar Rotación
        </button>
      </div>

    </div>
  </div>
</div>
</main>

<script src="../data/mock.js"></script>
<script src="../components/sync.js"></script>
<script src="../components/shared.js"></script>
<script>
(function initUser() {
  const u = SACO_SYNC.getCurrentUser();
  if (u) window.SACO.CURRENT_USER = u;
})();

document.getElementById('sidebar-mount').innerHTML = SACO_UI.renderSidebar('area-laboral');
document.getElementById('topbar-mount').innerHTML  = SACO_UI.renderTopbar('Área Laboral', 'Coordinación Laboral');

// ── Expedientes laborales ──────────────────────────────────────────────────
function renderExpedientesLaboral() {
  const data = window.SACO.EXPEDIENTES_ABOGADO.filter(e => e.area === 'LABORAL');
  document.getElementById('laboral-count').textContent = `${data.length} expediente${data.length !== 1 ? 's' : ''}`;
  const tbody = document.getElementById('laboral-tbody');
  if (!data.length) {
    tbody.innerHTML = `<tr><td colspan="7" class="px-6 py-12 text-center text-[#4f6080] text-sm">No hay expedientes laborales activos.</td></tr>`;
    return;
  }
  tbody.innerHTML = data.map(e => `
    <tr class="hover:bg-[#f0f7f8] transition-colors cursor-pointer" onclick="window.location='detalle-expediente.html'">
      <td class="px-6 py-4 font-mono text-xs font-bold text-[#1b3a5c]">${e.id}</td>
      <td class="px-6 py-4 max-w-[200px]">
        <p class="text-sm font-semibold text-[#1b3a5c] line-clamp-1">${e.caratula}</p>
        <p class="font-mono text-[10px] text-[#4f6080] mt-0.5">${e.numero_causa||''}</p>
        ${e.tiene_alerta ? `<p class="text-[10px] text-[#cd5055] font-semibold mt-0.5">${e.alerta_msg}</p>` : ''}
      </td>
      <td class="px-6 py-4 text-xs text-[#1b3a5c]">${e.abogado}</td>
      <td class="px-6 py-4 text-xs text-[#4f6080]">${e.tipo.replace(/_/g,' ')}</td>
      <td class="px-6 py-4">${SACO_UI.estadoBadge(e.estado, e.estado.replace(/_/g,' '))}</td>
      <td class="px-6 py-4 text-xs text-[#4f6080]">${e.fecha_recepcion}</td>
      <td class="px-6 py-4 text-right">
        <button class="material-symbols-outlined text-[#4f6080] hover:text-[#256386] transition-colors">more_vert</button>
      </td>
    </tr>`).join('');
}

// ── Letrados laboral ───────────────────────────────────────────────────────
function renderLetradosLaboral() {
  const letrados = window.SACO.ABOGADOS.LABORAL;
  document.getElementById('letrados-laboral').innerHTML = letrados.map(l => {
    const causas = window.SACO.EXPEDIENTES_ABOGADO.filter(e => e.area === 'LABORAL' && e.abogado === l).length;
    return `
    <div class="flex items-center justify-between p-3 bg-[#f0f7f8] rounded-xl hover:bg-surface-container transition-colors cursor-pointer">
      <div>
        <p class="text-xs font-bold text-[#1b3a5c]">${l}</p>
        <p class="text-[11px] text-[#4f6080]">Área Laboral — FIFO</p>
      </div>
      <span class="text-[10px] font-bold px-2 py-0.5 bg-[#e2eff5] text-[#4f6080] rounded-full">${causas} causas</span>
    </div>`;
  }).join('');
}

renderExpedientesLaboral();
renderLetradosLaboral();

SACO_SYNC.syncListen(({ type, payload }) => {
  if (type === 'ESTADO_CAMBIADO' || type === 'EXPEDIENTE_ASIGNADO') {
    renderExpedientesLaboral();
    SACO_UI.showToast('Expedientes actualizados desde otra pestaña.', 'info');
  }
  if (type === 'USUARIO_CAMBIADO') {
    if (payload && payload.usuario) window.SACO.CURRENT_USER = payload.usuario;
    document.getElementById('sidebar-mount').innerHTML = SACO_UI.renderSidebar('area-laboral');
    if (payload && payload.usuario) SACO_UI.updateUserPill(payload.usuario);
  }
});

// Aplicar offset correcto del sidebar al cargar
(function applyInitialSidebarOffset() {
  try {
    var collapsed = localStorage.getItem('saco_sidebar_collapsed') === '1';
    var ml = collapsed ? '52px' : '256px';
    var main   = document.getElementById('main-content');
    var topbar = document.getElementById('topbar-content');
    if (main)   main.style.marginLeft = ml;
    if (topbar) topbar.style.left     = ml;
  } catch(e) {}
})();
</script>
</body>
</html>
