<!DOCTYPE html>
<html lang="es" class="light">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Área Laboral | SOFSE SACO</title>
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>
tailwind.config = {
  theme: { extend: {
    colors: {
      "primary":"#256386","primary-dim":"#1d4e6b","primary-container":"#c5e0ea","on-primary":"#ffffff","on-primary-container":"#1b3a5c","on-primary-fixed":"#0f2a42",
      "secondary":"#3a70a9","secondary-container":"#dbeafe","on-secondary-fixed":"#1e3a5f","secondary-dim":"#2d5987",
      "tertiary":"#6d8eb0","tertiary-container":"#e0e7ef","on-tertiary-fixed":"#3a4f6a","tertiary-dim":"#5a7a9e",
      "surface":"#f0f7f8","surface-container-lowest":"#ffffff","surface-container-low":"#f0f7f8","surface-container":"#e2eff5","surface-container-high":"#d4e6ef","surface-container-highest":"#c5dde9",
      "background":"#f0f7f8","on-background":"#1b3a5c","on-surface":"#1b3a5c","on-surface-variant":"#4f6080",
      "outline":"#6d8eb0","outline-variant":"#bcc0c9",
      "error":"#cd5055","error-container":"#fee2e2","on-error-container":"#7f1d1d",
      "inverse-surface":"#1b3a5c",
      "header":"#242D4F",
    },
    fontFamily: { "headline":["Public Sans","sans-serif"], "body":["Inter","sans-serif"] },
    borderRadius: { DEFAULT:"0.125rem","sm":"0.25rem","lg":"0.5rem","xl":"0.75rem","2xl":"1rem","full":"9999px" },
  }}
}
</script>
<style>
  .material-symbols-outlined { font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24; vertical-align:middle; }
  body { font-family:'Inter',sans-serif; }
  h1,h2,h3,h4 { font-family:'Public Sans',sans-serif; }
  .shadow-card { box-shadow:0 1px 3px rgba(27,58,92,0.08),0 1px 2px rgba(27,58,92,0.04); }
  .shadow-card-lg { box-shadow:0 4px 12px rgba(27,58,92,0.1); }
  .causa-row { cursor:pointer; }
  .causa-row:hover td { background:#e2eff5; }
  .exp-row { transition: background 0.1s; }
  .exp-row:hover td { background:#f0f7f8; }
  .child-row td { background:#fafcfd; }
  .child-row:hover td { background:#f0f7f8; }
  @keyframes slideDown { from { opacity:0; transform:translateY(-4px); } to { opacity:1; transform:translateY(0); } }
  .child-row { animation: slideDown 0.15s ease-out both; }
</style>
</head>
<body class="bg-[#f0f7f8] text-[#1b3a5c]">

<div id="sidebar-mount"></div>
<div id="topbar-mount"></div>

<main id="main-content" class="min-h-screen transition-all duration-200" style="padding-top:64px;margin-left:256px">
<div class="p-8 space-y-7">

  <!-- Header -->
  <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
    <div>
      <nav class="flex items-center gap-2 text-xs text-[#4f6080] mb-2 uppercase tracking-wide font-medium">
        <span>SACO</span>
        <span class="material-symbols-outlined text-[12px]">chevron_right</span>
        <span class="text-[#256386]">Área Laboral</span>
      </nav>
      <h1 class="text-2xl font-headline font-bold text-[#1b3a5c]">Coordinación Laboral</h1>
      <p class="text-[#4f6080] text-sm mt-0.5">Demandas laborales, mediaciones y desafueros activos.</p>
    </div>
    <a href="alta-expediente.html" class="inline-flex items-center gap-2 px-5 py-2.5 bg-[#256386] hover:bg-[#1d4e6b] text-white font-bold text-sm rounded-xl shadow-md hover:brightness-105 active:scale-[0.98] transition-all">
      <span class="material-symbols-outlined">add_circle</span>
      Nuevo Expediente Laboral
    </a>
  </div>

  <div class="grid grid-cols-12 gap-7">

    <!-- ── Tabla de expedientes laborales ───────────────────────────────── -->
    <div class="col-span-12 space-y-5">

      <div class="bg-white rounded-xl shadow-sm border border-[#e5e7eb] overflow-hidden">
        <div class="px-6 py-4 border-b border-[#bcc0c9]/40 flex justify-between items-center">
          <div class="flex items-center gap-3">
            <span class="material-symbols-outlined text-[#256386]" style="font-variation-settings:'FILL' 1;">work</span>
            <h2 class="font-headline font-bold text-[#1b3a5c]">Expedientes Laborales Activos</h2>
          </div>
          <div class="flex items-center gap-3">
            <span class="text-[10px] font-bold bg-[#e2eff5] text-[#4f6080] px-3 py-1 rounded-full border border-[#bcc0c9]/80" id="laboral-count">0 expedientes</span>
            <button onclick="expandAllLaboral()" class="text-[10px] font-bold text-[#4f6080] hover:text-[#256386] transition-colors flex items-center gap-1">
              <span class="material-symbols-outlined text-[14px]">unfold_more</span>Expandir
            </button>
            <button onclick="collapseAllLaboral()" class="text-[10px] font-bold text-[#4f6080] hover:text-[#256386] transition-colors flex items-center gap-1">
              <span class="material-symbols-outlined text-[14px]">unfold_less</span>Colapsar
            </button>
          </div>
        </div>
        <div class="overflow-x-auto w-full">
          <table class="w-full text-left border-collapse min-w-[850px]"> 
            <thead class="bg-[#f0f7f8] border-b-2 border-[#dde6ec]">
              <tr>
                <th class="px-4 py-3.5 w-10"></th>
                <th class="px-4 py-3.5 text-[10px] font-black uppercase tracking-widest text-[#4f6080]">N° Causa / Exp</th>
                <th class="px-4 py-3.5 text-[10px] font-black uppercase tracking-widest text-[#4f6080]">Carátula</th>
                <th class="px-4 py-3.5 text-[10px] font-black uppercase tracking-widest text-[#4f6080]">Área</th>
                <th class="px-4 py-3.5 text-[10px] font-black uppercase tracking-widest text-[#4f6080]">Tipo</th>
                <th class="px-4 py-3.5 text-[10px] font-black uppercase tracking-widest text-[#4f6080]">Letrado</th>
                <th class="px-4 py-3.5 text-[10px] font-black uppercase tracking-widest text-[#4f6080]">Estado</th>
                <th class="px-4 py-3.5 text-[10px] font-black uppercase tracking-widest text-[#4f6080]">Recepción</th>
                <th class="px-4 py-3.5"></th>
              </tr>
            </thead>
            <tbody id="laboral-tbody" class="divide-y divide-[#bcc0c9]/20"></tbody>
          </table>
        </div>
      </div>

    </div>
  </div>
</div>
</main>

<script src="../data/mock.js"></script>
<script src="../components/sync.js"></script>
<script src="../components/shared.js"></script>
<script>
(function initUser() {
  const u = SACO_SYNC.getCurrentUser();
  if (u) window.SACO.CURRENT_USER = u;
})();

document.getElementById('sidebar-mount').innerHTML = SACO_UI.renderSidebar('area-laboral');
document.getElementById('topbar-mount').innerHTML  = SACO_UI.renderTopbar('Área Laboral', 'Coordinación Laboral');

let expandedCausas = new Set();
let allItems = [];

const areaColors = {
  CIVIL:   'bg-primary-container/60 text-[#1b3a5c]',
  LABORAL: 'bg-[#dbeafe] text-[#1e3a5f]',
  PENAL:   'bg-[#e0e7ef] text-[#3a4f6a]',
};

function construirItems(expedientes) {
  const causaMap = {};
  const sueltos  = [];
  expedientes.forEach(e => {
    const nc = (e.numero_causa || '').trim();
    if (nc && nc.toUpperCase() !== 'SS SOFSE') {
      if (!causaMap[nc]) causaMap[nc] = [];
      causaMap[nc].push(e);
    } else {
      sueltos.push(e);
    }
  });
  const items = [];
  Object.entries(causaMap).forEach(([nc, exps]) => items.push({ kind:'causa', numeroCausa:nc, expedientes:exps }));
  sueltos.forEach(e => items.push({ kind:'suelto', exp:e }));
  return items;
}

function renderTablaLaboral() {
  const data = window.SACO.EXPEDIENTES_ABOGADO.filter(e => e.area === 'LABORAL');
  document.getElementById('laboral-count').textContent = `${data.length} expediente${data.length !== 1 ? 's' : ''}`;
  allItems = construirItems(data);
  renderRows();
}

function renderRows() {
  const tbody = document.getElementById('laboral-tbody');
  if (!allItems.length) {
    tbody.innerHTML = `<tr><td colspan="8" class="px-6 py-12 text-center text-[#4f6080] text-sm">No hay expedientes laborales activos.</td></tr>`;
    return;
  }
  let html = '';
  allItems.forEach(item => {
    if (item.kind === 'causa') html += renderCausaRow(item);
    else html += renderExpRow(item.exp, false, false);
  });
  tbody.innerHTML = html;
}

function renderCausaRow(item) {
  const nc        = item.numeroCausa;
  const exps      = item.expedientes;
  const areas     = [...new Set(exps.map(e => e.area))];
  const expanded  = expandedCausas.has(nc);
  const hasAlerta = exps.some(e => e.tiene_alerta);
  const abogados  = [...new Set(exps.map(e => e.abogado))];
  const ncEsc     = nc.replace(/'/g, "\\'");

  let html = `
    <tr class="causa-row bg-[#e8f0f5] border-l-4 border-[#256386]/30 hover:border-[#256386]/60 transition-all" onclick="toggleCausaLaboral('${ncEsc}')">
      <td class="px-4 py-3.5">
        <div class="w-7 h-7 flex items-center justify-center rounded-lg ${expanded ? 'bg-[#256386] text-white' : 'bg-[#c5e0ea] text-[#256386]'} transition-colors">
          <span class="material-symbols-outlined text-[16px] transition-transform duration-200" style="${expanded ? 'transform:rotate(90deg)' : ''}">chevron_right</span>
        </div>
      </td>
      <td class="px-4 py-3.5">
        <div class="flex items-center gap-2">
          ${hasAlerta ? `<span class="material-symbols-outlined text-[#cd5055] text-[14px] flex-shrink-0" style="font-variation-settings:'FILL' 1;">warning</span>` : ''}
          <div>
            <div class="flex items-center gap-1.5">
              <span class="material-symbols-outlined text-[#256386] text-[15px]" style="font-variation-settings:'FILL' 1;">folder</span>
              <span class="font-mono text-xs font-bold text-[#256386]">${nc}</span>
            </div>
            <p class="text-[10px] text-[#4f6080] mt-0.5">${exps.length} expediente${exps.length !== 1 ? 's' : ''}</p>
          </div>
        </div>
      </td>
      <td class="px-4 py-3.5">
        ${hasAlerta ? `<p class="text-[10px] text-[#cd5055] font-semibold">${exps.find(e=>e.tiene_alerta)?.alerta_msg || ''}</p>` : '<span class="text-[10px] text-[#4f6080]">—</span>'}
      </td>
      <td class="px-4 py-3.5">
        <div class="flex flex-wrap gap-1.5">
          ${areas.map(a => `<span class="text-[10px] font-bold px-1.5 py-0.5 rounded ${areaColors[a]||''}">${a}</span>`).join('')}
        </div>
      </td>
      <td class="px-4 py-3.5">
        <span class="inline-flex items-center gap-1 text-[10px] font-bold px-2 py-0.5 rounded-full bg-[#256386]/10 text-[#256386]">
          <span class="material-symbols-outlined text-[11px]">link</span>Causa judicial
        </span>
      </td>
      <td class="px-4 py-3.5">
        ${abogados.length === 1
          ? `<span class="text-xs text-[#1b3a5c]">${abogados[0].replace(/^Dr\. |^Dra\. /, '')}</span>`
          : abogados.map(a => `<p class="text-[10px] text-[#4f6080]">${a.replace(/^Dr\. |^Dra\. /, '')}</p>`).join('')
        }
      </td>
      <td class="px-4 py-3.5"></td>
      <td class="px-4 py-3.5"></td>
      <td class="px-4 py-3.5 text-right">
        <button onclick="event.stopPropagation()" class="text-[11px] font-bold text-[#256386] hover:underline">Ver todo</button>
      </td>
    </tr>`;

  if (expanded) {
    exps.forEach((exp, i) => { html += renderExpRow(exp, true, i === exps.length - 1); });
  }
  return html;
}

function renderExpRow(e, isChild, isLast) {
  const numeroCausa = (e?.numero_causa || '').trim();
  const sinCausa =
    numeroCausa === '' ||
    numeroCausa.toUpperCase() === 'SS SOFSE';
  const nombreCorto = (e.abogado || '').replace(/^Dr\. |^Dra\. /, '');
  return `
    <tr class="${isChild ? 'child-row' : 'exp-row'} cursor-pointer ${isChild ? 'border-l-4 border-[#256386]/10' : ''}" onclick="window.location='detalle-expediente.html?id=${e.id}'">
      <td class="px-4 py-3.5 relative ${isChild ? 'pl-8' : ''}">
        ${isChild ? `
          <div class="absolute left-4 top-0 bottom-0 w-px bg-[#bcc0c9]" ${isLast ? 'style="bottom:50%"' : ''}></div>
          <div class="absolute left-4 top-1/2 w-3.5 h-px bg-[#bcc0c9]"></div>
          <div class="w-6 h-6 flex items-center justify-center relative ml-3">
            ${e.tiene_alerta ? `<span class="material-symbols-outlined text-[#cd5055] text-[16px]" style="font-variation-settings:'FILL' 1;">warning</span>` : `<span class="material-symbols-outlined text-[#4f6080] text-[16px]">description</span>`}
          </div>` : `
          <div class="w-8 h-8 flex items-center justify-center rounded-lg ${e.tiene_alerta ? 'bg-[#fee2e2]' : 'bg-[#f0f7f8]'}">
            ${e.tiene_alerta ? `<span class="material-symbols-outlined text-[#cd5055] text-[18px]" style="font-variation-settings:'FILL' 1;">warning</span>` : `<span class="material-symbols-outlined text-[#4f6080] text-[18px]">description</span>`}
          </div>`}
      </td>
      <td class="px-4 py-3.5">
        <span class="font-mono text-xs font-bold text-[#1b3a5c]">${e.id}</span>
        <p class="font-mono text-[10px] text-[#4f6080] mt-0.5">${e.numero_causa || ''}</p>
        ${sinCausa ? `<span class="text-[9px] font-bold text-[#cd5055] flex items-center gap-0.5"><span class="material-symbols-outlined text-[11px]">link_off</span>Sin causa</span>` : ''}
      </td>
      <td class="px-4 py-3.5 max-w-xs">
        <p class="text-sm font-semibold text-[#1b3a5c] line-clamp-2 leading-snug">${e.caratula}</p>
        ${e.tiene_alerta ? `<p class="text-[10px] text-[#cd5055] font-semibold mt-0.5">${e.alerta_msg}</p>` : ''}
      </td>
      <td class="px-4 py-3.5">
        <div class="flex flex-wrap gap-1.5">
          <span class="text-[10px] font-bold px-1.5 py-0.5 rounded ${areaColors[e.area] || ''}">
            ${e.area}
          </span>
        </div>
      </td>
      <td class="px-4 py-3.5 text-xs text-[#4f6080]">${(e.tipo||'').replace(/_/g,' ')}</td>
      <td class="px-4 py-3.5 text-xs text-[#1b3a5c]">${nombreCorto}</td>
      <td class="px-4 py-3.5">${SACO_UI.estadoBadge(e.estado, (e.estadoLabel || e.estado.replace(/_/g,' ')))}</td>
      <td class="px-4 py-3.5 text-xs text-[#4f6080]">${e.fecha_recepcion}</td>
      <td class="px-4 py-3.5 text-right">
        <div class="relative inline-block" onclick="event.stopPropagation()">
          <button onclick="toggleMenuLaboral('menu-${e.id}', this)"
            class="w-7 h-7 flex items-center justify-center rounded-lg hover:bg-[#e2eff5] transition-colors text-[#4f6080]">
            <span class="material-symbols-outlined text-[18px]">more_vert</span>
          </button>
        </div>
      </td>
    </tr>`;
}

function toggleCausaLaboral(nc) {
  if (expandedCausas.has(nc)) expandedCausas.delete(nc);
  else expandedCausas.add(nc);
  renderRows();
}

function toggleMenuLaboral(id, btn) {
  // cerrar otros
  document.querySelectorAll('[id^="menu-"]').forEach(m => m.remove());

  const rect = btn.getBoundingClientRect();
  const menu = document.createElement('div');

  menu.id = id;
  menu.className =
    'fixed z-[200] bg-white border border-[#e5e7eb] rounded-xl shadow-lg py-1 min-w-[180px]';

  menu.style.top = (rect.bottom + 4) + 'px';
  menu.style.left = (rect.right - 180) + 'px';

  const esCausa = id.includes('menu-causa-');
  const itemId = id.replace('menu-causa-', '').replace('menu-', '');

  if (esCausa) {
    menu.innerHTML = `
      <button onclick="toggleCausaLaboral('${itemId}')"
        class="w-full text-left px-4 py-2.5 text-sm text-[#1b3a5c] hover:bg-[#f0f7f8] flex items-center gap-2.5">
        <span class="material-symbols-outlined text-[16px] text-[#4f6080]">
          unfold_more
        </span>
        Expandir / colapsar
      </button>

      <button onclick="SACO_UI.showToast('Acción pendiente','info')"
        class="w-full text-left px-4 py-2.5 text-sm text-[#1b3a5c] hover:bg-[#f0f7f8] flex items-center gap-2.5">
        <span class="material-symbols-outlined text-[16px] text-[#4f6080]">
          visibility
        </span>
        Ver causa
      </button>
    `;
  } else {
    const exp = window.SACO.EXPEDIENTES_ABOGADO.find(e => e.id == itemId);
    const tieneCausa =
      exp?.numero_causa &&
      exp.numero_causa.trim() !== '' &&
      exp.numero_causa.toUpperCase() !== 'SS SOFSE';

    menu.innerHTML = `
      <button onclick="window.location='detalle-expediente.html?id=${itemId}'"
        class="w-full text-left px-4 py-2.5 text-sm text-[#1b3a5c] hover:bg-[#f0f7f8] flex items-center gap-2.5">
        <span class="material-symbols-outlined text-[16px] text-[#4f6080]">
          open_in_new
        </span>
        Visualizar
      </button>

      <button onclick="SACO_UI.showToast('${tieneCausa ? 'Expediente desagrupado' : 'Agrupar expediente'}','info')"
        class="w-full text-left px-4 py-2.5 text-sm text-[#1b3a5c] hover:bg-[#f0f7f8] flex items-center gap-2.5">
        <span class="material-symbols-outlined text-[16px] text-[#4f6080]">
          ${tieneCausa ? 'folder_off' : 'create_new_folder'}
        </span>
        ${tieneCausa ? 'Desagrupar' : 'Agrupar'}
      </button>

      ${puedeReasignar() ? `
        <button onclick="SACO_UI.showToast('Reasignación iniciada','info')"
          class="w-full text-left px-4 py-2.5 text-sm text-[#1b3a5c] hover:bg-[#f0f7f8] flex items-center gap-2.5">
          <span class="material-symbols-outlined text-[16px] text-[#4f6080]">
            forward
          </span>
          Reasignar
        </button>
      ` : ''}
    `;
  }

  document.body.appendChild(menu);

  setTimeout(() => {
    document.addEventListener('click', function h() {
      menu.remove();
      document.removeEventListener('click', h);
    });
  }, 50);
}

function puedeReasignar() {
  return SACO_UI.puedeReasignar();
}

function expandAllLaboral() {
  allItems.forEach(item => { if (item.kind === 'causa') expandedCausas.add(item.numeroCausa); });
  renderRows();
}

function collapseAllLaboral() {
  expandedCausas.clear();
  renderRows();
}

renderTablaLaboral();

SACO_SYNC.syncListen(({ type, payload }) => {
  if (type === 'ESTADO_CAMBIADO' || type === 'EXPEDIENTE_ASIGNADO') {
    renderTablaLaboral();
    SACO_UI.showToast('Expedientes actualizados desde otra pestaña.', 'info');
  }
  if (type === 'USUARIO_CAMBIADO') {
    if (payload && payload.usuario) window.SACO.CURRENT_USER = payload.usuario;
    document.getElementById('sidebar-mount').innerHTML = SACO_UI.renderSidebar('area-laboral');
    if (payload && payload.usuario) SACO_UI.updateUserPill(payload.usuario);
  }
});

(function applyInitialSidebarOffset() {
  try {
    var collapsed = localStorage.getItem('saco_sidebar_collapsed') === '1';
    var ml = collapsed ? '52px' : '256px';
    var main   = document.getElementById('main-content');
    var topbar = document.getElementById('topbar-content');
    if (main)   main.style.marginLeft = ml;
    if (topbar) topbar.style.left     = ml;
  } catch(e) {}
})();
</script>
</body>
</html>
