<!DOCTYPE html>
<html lang="es" class="light">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Bandeja Área | SOFSE SACO</title>
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>
tailwind.config = {
  theme: { extend: {
    colors: {
      "primary":"#256386","primary-dim":"#1d4e6b","primary-container":"#c5e0ea","on-primary":"#ffffff","on-primary-container":"#1b3a5c","on-primary-fixed":"#0f2a42",
      "secondary":"#3a70a9","secondary-container":"#dbeafe","on-secondary-fixed":"#1e3a5f","secondary-dim":"#2d5987",
      "tertiary":"#6d8eb0","tertiary-container":"#e0e7ef","on-tertiary-fixed":"#3a4f6a","tertiary-dim":"#5a7a9e",
      "surface":"#f0f7f8","surface-container-lowest":"#ffffff","surface-container-low":"#f0f7f8","surface-container":"#e2eff5","surface-container-high":"#d4e6ef","surface-container-highest":"#c5dde9",
      "background":"#f0f7f8","on-background":"#1b3a5c","on-surface":"#1b3a5c","on-surface-variant":"#4f6080",
      "outline":"#6d8eb0","outline-variant":"#bcc0c9",
      "error":"#cd5055","error-container":"#fee2e2","on-error-container":"#7f1d1d",
      "inverse-surface":"#1b3a5c",
      "header":"#242D4F",
    },
    fontFamily: { "headline":["Public Sans","sans-serif"], "body":["Inter","sans-serif"] },
    borderRadius: { DEFAULT:"0.125rem","sm":"0.25rem","lg":"0.5rem","xl":"0.75rem","2xl":"1rem","full":"9999px" },
  }}
}
</script>
<style>
  .material-symbols-outlined { font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24; vertical-align:middle; }
  body { font-family:'Inter',sans-serif; }
  h1,h2,h3,h4 { font-family:'Public Sans',sans-serif; }
  .shadow-card { box-shadow:0 1px 3px rgba(27,58,92,0.08),0 1px 2px rgba(27,58,92,0.04); }

  /* Causa row */
  .causa-row { cursor:pointer; }
  .causa-row:hover td { background:#e2eff5; }

  /* Expediente row */
  .exp-row { transition: background 0.1s; }
  .exp-row:hover td { background:#f0f7f8; }

  /* Child row (dentro de causa) */
  .child-row td { background:#fafcfd; }
  .child-row:hover td { background:#f0f7f8; }

  /* Animación apertura */
  @keyframes slideDown {
    from { opacity:0; transform:translateY(-4px); }
    to   { opacity:1; transform:translateY(0); }
  }
  .child-row { animation: slideDown 0.15s ease-out both; }
</style>
</head>
<body class="bg-[#f0f7f8] text-[#1b3a5c]">

<div id="sidebar-mount"></div>
<div id="topbar-mount"></div>

<main id="main-content" class="min-h-screen transition-all duration-200" style="padding-top:64px;margin-left:256px">
<div class="p-8">

  <!-- ── Header + Tabs ──────────────────────────────────────────────── -->
  <div class="flex flex-col md:flex-row md:items-end justify-between mb-5 gap-4">
    <div>
      <h2 id="page-title" class="font-headline text-3xl font-extrabold tracking-tight text-[#1b3a5c] mb-1">Bandeja Área</h2>
      <p class="text-[#4f6080] text-sm" id="subtitle">Mostrando <strong id="total-count">0</strong> expedientes.</p>
    </div>
    <div class="flex bg-[#f0f7f8] p-1 rounded-xl shadow-inner gap-1">
      <button onclick="setTab('activos')"  id="tab-activos"  class="tab-btn px-5 py-2 bg-surface-container-lowest text-[#256386] font-bold rounded-lg shadow-sm text-sm">Activos</button>
      <button onclick="setTab('urgentes')" id="tab-urgentes" class="tab-btn px-5 py-2 text-[#4f6080] hover:text-on-surface font-medium text-sm transition-colors flex items-center gap-1">
        Urgentes
        <span id="urgentes-badge" class="w-4 h-4 bg-[#cd5055] text-white text-[9px] font-black rounded-full flex items-center justify-center">0</span>
      </button>
    </div>
  </div>

  <!-- ── Barra de filtros horizontal ───────────────────────────────── -->
  <div class="bg-white rounded-xl shadow-sm border border-[#e5e7eb] px-5 py-4 mb-5">

    <div class="flex flex-wrap items-center gap-3">

      <!-- Búsqueda -->
      <div class="relative flex-1 min-w-[200px]">
        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-[#4f6080] text-[18px]">search</span>
        <input id="search-input" oninput="applyFilters()"
          class="w-full bg-[#f0f7f8] border border-[#bcc0c9] rounded-lg pl-9 pr-3 py-2 text-sm focus:ring-2 focus:ring-[#256386]/20 focus:outline-none"
          placeholder="Buscar por carátula, N° causa..."/>
      </div>

      <!-- Área -->
      <div class="relative">
        <select id="f-area" onchange="applyFilters()"
          class="bg-[#f0f7f8] border border-[#bcc0c9] rounded-lg py-2 pl-3 pr-8 text-sm focus:ring-2 focus:ring-[#256386]/20 focus:outline-none appearance-none cursor-pointer min-w-[120px]">
          <option value="">Área: Todas</option>
          <option value="CIVIL">Civil</option>
          <option value="LABORAL">Laboral</option>
          <option value="PENAL">Penal</option>
        </select>
        <span class="material-symbols-outlined absolute right-2 top-1/2 -translate-y-1/2 text-[#4f6080] text-[16px] pointer-events-none">expand_more</span>
      </div>

      <!-- Tipo de gestión -->
      <div class="relative">
        <select id="f-tipo" onchange="applyFilters()"
          class="bg-[#f0f7f8] border border-[#bcc0c9] rounded-lg py-2 pl-3 pr-8 text-sm focus:ring-2 focus:ring-[#256386]/20 focus:outline-none appearance-none cursor-pointer min-w-[140px]">
          <option value="">Tipo: Todos</option>
        </select>
        <span class="material-symbols-outlined absolute right-2 top-1/2 -translate-y-1/2 text-[#4f6080] text-[16px] pointer-events-none">expand_more</span>
      </div>

      <!-- Estado -->
      <div class="relative">
        <select id="f-estado" onchange="applyFilters()"
          class="bg-[#f0f7f8] border border-[#bcc0c9] rounded-lg py-2 pl-3 pr-8 text-sm focus:ring-2 focus:ring-[#256386]/20 focus:outline-none appearance-none cursor-pointer min-w-[140px]">
          <option value="">Estado: Todos</option>
        </select>
        <span class="material-symbols-outlined absolute right-2 top-1/2 -translate-y-1/2 text-[#4f6080] text-[16px] pointer-events-none">expand_more</span>
      </div>

      <!-- Fecha desde/hasta -->
      <div class="flex items-center gap-2">
        <input id="f-fecha-desde" oninput="applyFilters()" type="date"
          class="bg-[#f0f7f8] border border-[#bcc0c9] rounded-lg py-2 px-3 text-sm focus:ring-2 focus:ring-[#256386]/20 focus:outline-none"
          title="Fecha desde"/>
        <span class="text-[#4f6080] text-xs">—</span>
        <input id="f-fecha-hasta" oninput="applyFilters()" type="date"
          class="bg-[#f0f7f8] border border-[#bcc0c9] rounded-lg py-2 px-3 text-sm focus:ring-2 focus:ring-[#256386]/20 focus:outline-none"
          title="Fecha hasta"/>
      </div>

      <!-- Toggle alertas -->
      <label class="flex items-center gap-2 cursor-pointer px-3 py-2 rounded-lg hover:bg-[#f0f7f8] transition-colors border border-transparent hover:border-[#bcc0c9]">
        <input type="checkbox" id="f-urgente" onchange="applyFilters()" class="rounded text-[#cd5055] focus:ring-[#cd5055]"/>
        <span class="material-symbols-outlined text-[#cd5055] text-[16px]" style="font-variation-settings:'FILL' 1;">warning</span>
        <span class="text-sm text-[#4f6080] whitespace-nowrap">Con alerta</span>
      </label>

      <!-- Letrado -->
      <div id="filter-letrado-wrap" class="relative">
        <select id="f-letrado" onchange="applyFilters()"
          class="bg-[#f0f7f8] border border-[#bcc0c9] rounded-lg py-2 pl-3 pr-8 text-sm focus:ring-2 focus:ring-[#256386]/20 focus:outline-none appearance-none cursor-pointer min-w-[160px]">
          <option value="">Letrado: Todos</option>
        </select>
        <span class="material-symbols-outlined absolute right-2 top-1/2 -translate-y-1/2 text-[#4f6080] text-[16px] pointer-events-none">expand_more</span>
      </div>

      <!-- Limpiar -->
      <button onclick="limpiarFiltros()"
        class="ml-auto text-[10px] font-bold text-[#4f6080] hover:text-[#256386] flex items-center gap-1 transition-colors whitespace-nowrap">
        <span class="material-symbols-outlined text-[14px]">close</span>
        Limpiar
      </button>

    </div>

    <!-- Chips de filtros activos -->
    <div id="chips-filtros" class="hidden flex-wrap gap-2 mt-3 pt-3 border-t border-[#bcc0c9]/30"></div>

  </div>

  <!-- ── Tabla ──────────────────────────────────────────────────────── -->
  <div class="col-span-12">

    <div class="bg-white rounded-xl shadow-sm border border-[#e5e7eb] overflow-hidden">
      <div class="px-6 py-4 border-b border-[#bcc0c9]/40 flex justify-between items-center">
        <p class="text-xs text-[#4f6080]"><span id="showing-count">0</span> elementos</p>
        <div class="flex gap-3">
          <button onclick="expandAll()" class="text-[10px] font-bold text-[#4f6080] hover:text-[#256386] transition-colors flex items-center gap-1">
            <span class="material-symbols-outlined text-[14px]">unfold_more</span>Expandir todo
          </button>
          <button onclick="collapseAll()" class="text-[10px] font-bold text-[#4f6080] hover:text-[#256386] transition-colors flex items-center gap-1">
            <span class="material-symbols-outlined text-[14px]">unfold_less</span>Colapsar
          </button>
        </div>
      </div>

      <table class="w-full text-left border-collapse">
        <thead>
          <tr class="bg-[#f0f7f8]">
            <th class="px-4 py-3.5 w-10"></th>
            <th class="px-4 py-3.5 text-[10px] font-black uppercase tracking-widest text-[#4f6080]">N° Causa / Expediente</th>
            <th class="px-4 py-3.5 text-[10px] font-black uppercase tracking-widest text-[#4f6080]">Carátula</th>
            <th class="px-4 py-3.5 text-[10px] font-black uppercase tracking-widest text-[#4f6080]">Área</th>
            <th class="px-4 py-3.5 text-[10px] font-black uppercase tracking-widest text-[#4f6080]">Tipo</th>
            <th id="th-letrado" class="px-4 py-3.5 text-[10px] font-black uppercase tracking-widest text-[#4f6080]">Letrado</th>
            <th class="px-4 py-3.5 text-[10px] font-black uppercase tracking-widest text-[#4f6080]">Estado</th>
            <th class="px-4 py-3.5 text-[10px] font-black uppercase tracking-widest text-[#4f6080]">Recepción</th>
            <th class="px-4 py-3.5"></th>
          </tr>
        </thead>
        <tbody id="exp-tbody" class="divide-y divide-[#bcc0c9]/20"></tbody>
      </table>

      <!-- Paginación -->
      <div class="px-6 py-4 border-t border-[#bcc0c9]/40 flex justify-between items-center">
        <p class="text-xs text-[#4f6080]">Página 1 de 1</p>
        <div class="flex gap-1">
          <button class="w-8 h-8 flex items-center justify-center rounded-lg hover:bg-surface-container disabled:opacity-30 transition-colors" disabled>
            <span class="material-symbols-outlined text-[16px]">chevron_left</span>
          </button>
          <button class="w-8 h-8 flex items-center justify-center rounded-lg bg-[#256386] text-white font-bold text-xs">1</button>
          <button class="w-8 h-8 flex items-center justify-center rounded-lg hover:bg-surface-container transition-colors">
            <span class="material-symbols-outlined text-[16px]">chevron_right</span>
          </button>
        </div>
      </div>
    </div>

  </div>
</div>
</main>

<script src="../data/mock.js"></script>
<script src="../components/sync.js"></script>
<script src="../components/shared.js"></script>
<script>
// ─────────────────────────────────────────────────────────────────────────────
// INIT USER
// ─────────────────────────────────────────────────────────────────────────────
(function initUser() {
  const u = SACO_SYNC.getCurrentUser();
  if (u) window.SACO.CURRENT_USER = u;
})();

document.getElementById('sidebar-mount').innerHTML = SACO_UI.renderSidebar('bandeja-area');
document.getElementById('topbar-mount').innerHTML  = SACO_UI.renderTopbar('Bandeja Área', 'Bandeja Área');

// ─────────────────────────────────────────────────────────────────────────────
// MODELO DE DATOS
// ─────────────────────────────────────────────────────────────────────────────

// Retorna todos los expedientes — sin filtrar por usuario.
function getExpedientesArea() {
  return window.SACO.EXPEDIENTES_ABOGADO;
}

// Construir ítems de bandeja:
// Cada ítem es: { kind:'causa', numeroCausa, expedientes:[] } | { kind:'suelto', exp }
function construirItemsBandeja(expedientes) {
  const causaMap = {};
  const sueltos  = [];

  expedientes.forEach(e => {
    const nc = (e.numero_causa || '').trim();
    if (nc && nc.toUpperCase() !== 'SS SOFSE') {
      if (!causaMap[nc]) causaMap[nc] = [];
      causaMap[nc].push(e);
    } else {
      sueltos.push(e);
    }
  });

  const items = [];
  Object.entries(causaMap).forEach(([nc, exps]) => {
    items.push({ kind: 'causa', numeroCausa: nc, expedientes: exps });
  });
  sueltos.forEach(e => items.push({ kind: 'suelto', exp: e }));

  return items;
}

// ─────────────────────────────────────────────────────────────────────────────
// ESTADO
// ─────────────────────────────────────────────────────────────────────────────
let currentTab     = 'activos';
let expandedCausas = new Set();
let allItems       = [];

// ─────────────────────────────────────────────────────────────────────────────
// COLORES
// ─────────────────────────────────────────────────────────────────────────────
const areaColors = {
  CIVIL:   'bg-primary-container/60 text-[#1b3a5c]',
  LABORAL: 'bg-[#dbeafe] text-[#1e3a5f]',
  PENAL:   'bg-[#e0e7ef] text-[#3a4f6a]',
};

const areaNombres = { CIVIL: 'Civil', LABORAL: 'Laboral', PENAL: 'Penal' };

// ─────────────────────────────────────────────────────────────────────────────
// TABS
// ─────────────────────────────────────────────────────────────────────────────
function setTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => {
    const active = b.id === `tab-${tab}`;
    b.className = `tab-btn px-5 py-2 rounded-lg text-sm transition-colors font-${active?'bold':'medium'} ${active ? 'bg-surface-container-lowest text-[#256386] shadow-sm' : 'text-[#4f6080] hover:text-on-surface'}`;
  });
  applyFilters();
}

// ─────────────────────────────────────────────────────────────────────────────
// POBLAR FILTROS DINÁMICOS
// ─────────────────────────────────────────────────────────────────────────────
function poblarFiltroTipo() {
  const tipos = [...new Set(
    window.SACO.EXPEDIENTES_ABOGADO.map(e => e.tipo)
  )].sort();
  const sel = document.getElementById('f-tipo');
  tipos.forEach(t => {
    const opt = document.createElement('option');
    opt.value = t;
    opt.textContent = t.replace(/_/g,' ');
    sel.appendChild(opt);
  });
}

function poblarFiltroEstado() {
  const estados = [...new Set(
    window.SACO.EXPEDIENTES_ABOGADO.map(e => e.estado)
  )].sort();
  const sel = document.getElementById('f-estado');
  estados.forEach(s => {
    const opt = document.createElement('option');
    opt.value = s;
    opt.textContent = s.replace(/_/g,' ');
    sel.appendChild(opt);
  });
}

function poblarFiltroLetrado() {
  const letradoSelect = document.getElementById('f-letrado');
  const abogados = [...new Set(window.SACO.EXPEDIENTES_ABOGADO.map(e => e.abogado))].sort();
  abogados.forEach(a => {
    const opt = document.createElement('option');
    opt.value = a;
    opt.textContent = a;
    letradoSelect.appendChild(opt);
  });
}

// ─────────────────────────────────────────────────────────────────────────────
// CHIPS DE FILTROS ACTIVOS
// ─────────────────────────────────────────────────────────────────────────────
function renderChipsFiltros() {
  const chips  = [];
  const tipo   = document.getElementById('f-tipo').value;
  const area   = document.getElementById('f-area').value;
  const estado = document.getElementById('f-estado').value;
  const search = document.getElementById('search-input').value;
  const desde  = document.getElementById('f-fecha-desde').value;
  const hasta  = document.getElementById('f-fecha-hasta').value;
  const alerta = document.getElementById('f-urgente').checked;
  const letrado = document.getElementById('f-letrado')?.value || '';

  if (tipo)    chips.push({ label: tipo.replace(/_/g,' '),   clear: () => { document.getElementById('f-tipo').value=''; applyFilters(); } });
  if (area)    chips.push({ label: areaNombres[area]||area,  clear: () => { document.getElementById('f-area').value=''; applyFilters(); } });
  if (estado)  chips.push({ label: estado.replace(/_/g,' '), clear: () => { document.getElementById('f-estado').value=''; applyFilters(); } });
  if (search)  chips.push({ label: `"${search}"`,            clear: () => { document.getElementById('search-input').value=''; applyFilters(); } });
  if (desde)   chips.push({ label: `Desde ${desde}`,         clear: () => { document.getElementById('f-fecha-desde').value=''; applyFilters(); } });
  if (hasta)   chips.push({ label: `Hasta ${hasta}`,         clear: () => { document.getElementById('f-fecha-hasta').value=''; applyFilters(); } });
  if (alerta)  chips.push({ label: 'Con alerta',             clear: () => { document.getElementById('f-urgente').checked=false; applyFilters(); } });
  if (letrado) chips.push({ label: letrado.replace(/^Dr\. |^Dra\. /,''), clear: () => { document.getElementById('f-letrado').value=''; applyFilters(); } });

  const container = document.getElementById('chips-filtros');
  if (!chips.length) {
    container.classList.add('hidden');
    container.classList.remove('flex');
    return;
  }
  container.classList.remove('hidden');
  container.classList.add('flex');
  container.innerHTML = chips.map((c, i) => `
    <span class="inline-flex items-center gap-1.5 px-2.5 py-1 bg-[#c5e0ea] text-[#1b3a5c] text-[10px] font-bold rounded-full">
      ${c.label}
      <button onclick="clearChip(${i})" class="hover:text-[#cd5055] transition-colors">
        <span class="material-symbols-outlined text-[12px]">close</span>
      </button>
    </span>`).join('');

  window._chipClears = chips.map(c => c.clear);
}

function clearChip(i) {
  if (window._chipClears && window._chipClears[i]) window._chipClears[i]();
}

// ─────────────────────────────────────────────────────────────────────────────
// FILTROS Y RENDER
// ─────────────────────────────────────────────────────────────────────────────
function applyFilters() {
  const tipo       = document.getElementById('f-tipo')?.value || '';
  const area       = document.getElementById('f-area')?.value || '';
  const estado     = document.getElementById('f-estado')?.value || '';
  const fechaDesde = document.getElementById('f-fecha-desde')?.value;
  const fechaHasta = document.getElementById('f-fecha-hasta')?.value;
  const search     = document.getElementById('search-input').value.toLowerCase();
  const urgente    = document.getElementById('f-urgente').checked;
  const letrado    = document.getElementById('f-letrado')?.value || '';
  const exps       = getExpedientesArea();

  const filtrados = exps.filter(e => {
    if (currentTab === 'urgentes' && e.prioridad !== 'ALTA') return false;
    if (currentTab === 'activos'  && e.estado === 'CUMPLIDO') return false;
    if (urgente  && !e.tiene_alerta) return false;
    if (area     && e.area    !== area)    return false;
    if (letrado  && e.abogado !== letrado) return false;
    if (tipo     && e.tipo    !== tipo)    return false;
    if (estado   && e.estado  !== estado)  return false;
    if (fechaDesde && e.fecha_recepcion < fechaDesde) return false;
    if (fechaHasta && e.fecha_recepcion > fechaHasta) return false;
    if (search && !e.caratula.toLowerCase().includes(search) &&
        !e.id.toLowerCase().includes(search) &&
        !(e.numero_causa||'').toLowerCase().includes(search)) return false;
    return true;
  });

  allItems = construirItemsBandeja(filtrados);

  const urgentes = exps.filter(e => e.tiene_alerta && e.estado !== 'CUMPLIDO');
  document.getElementById('urgentes-badge').textContent = urgentes.length;

  renderTabla(allItems);
  updateSubtitle(filtrados, area);
  renderChipsFiltros();
}

function limpiarFiltros() {
  document.getElementById('search-input').value   = '';
  document.getElementById('f-area').value         = '';
  document.getElementById('f-urgente').checked    = false;
  document.getElementById('f-tipo').value         = '';
  document.getElementById('f-estado').value       = '';
  document.getElementById('f-fecha-desde').value  = '';
  document.getElementById('f-fecha-hasta').value  = '';
  document.getElementById('f-letrado').value      = '';
  applyFilters();
}

function updateSubtitle(filtrados, area) {
  const total = filtrados.length;
  document.getElementById('total-count').textContent = total;
  const areaLabel = area ? `Área <strong>${areaNombres[area]||area}</strong>` : 'Todas las áreas';
  document.getElementById('subtitle').innerHTML =
    `${areaLabel} — <strong>${total}</strong> expediente${total !== 1 ? 's' : ''}.`;
}

// ─────────────────────────────────────────────────────────────────────────────
// RENDER TABLA
// ─────────────────────────────────────────────────────────────────────────────
const SHOW_ABOGADO = true;

function renderTabla(items) {
  const tbody = document.getElementById('exp-tbody');
  document.getElementById('showing-count').textContent = items.length;

  if (!items.length) {
    tbody.innerHTML = `<tr><td colspan="9" class="px-6 py-12 text-center text-[#4f6080] text-sm">No hay expedientes que coincidan con los filtros.</td></tr>`;
    return;
  }

  let html = '';
  items.forEach(item => {
    if (item.kind === 'causa') {
      html += renderCausaRow(item, SHOW_ABOGADO);
    } else {
      html += renderExpedienteRow(item.exp, false, false, SHOW_ABOGADO);
    }
  });

  tbody.innerHTML = html;
}

// ── Fila de causa agrupadora ──────────────────────────────────────────────
function renderCausaRow(item, showAbogado = false) {
  const nc           = item.numeroCausa;
  const exps         = item.expedientes;
  const expanded     = expandedCausas.has(nc);
  const hasAlerta    = exps.some(e => e.tiene_alerta);
  const areas        = [...new Set(exps.map(e => e.area))];
  const abogados     = [...new Set(exps.map(e => e.abogado))];
  const expPrincipal = exps.find(e => e.es_principal) || exps[0];

  let html = `
    <tr class="causa-row bg-[#f0f7f8] border-l-4 border-[#256386]/30 hover:border-[#256386]/60 transition-all" onclick="toggleCausa('${nc.replace(/'/g, "\\'")}')">
      <td class="px-4 py-3.5">
        <div class="w-7 h-7 flex items-center justify-center rounded-lg ${expanded ? 'bg-[#256386] text-white' : 'bg-[#c5e0ea] text-[#256386]'} transition-colors">
          <span class="material-symbols-outlined text-[16px] transition-transform duration-200" style="${expanded ? 'transform:rotate(90deg)' : ''}">chevron_right</span>
        </div>
      </td>
      <td class="px-4 py-3.5">
        <div class="flex items-center gap-2">
          ${hasAlerta ? `<span class="material-symbols-outlined text-[#cd5055] text-[14px] flex-shrink-0" style="font-variation-settings:'FILL' 1;">warning</span>` : ''}
          <div>
            <div class="flex items-center gap-2">
              <span class="material-symbols-outlined text-[#256386] text-[16px]" style="font-variation-settings:'FILL' 1;">folder</span>
              <span class="font-mono text-xs font-bold text-[#256386]">${nc}</span>
            </div>
            <p class="text-[10px] text-[#4f6080] mt-0.5">${exps.length} expediente${exps.length !== 1 ? 's' : ''} vinculado${exps.length !== 1 ? 's' : ''}</p>
          </div>
        </div>
      </td>
      <td class="px-4 py-3.5">---</td>
      <td class="px-4 py-3.5">
        <div class="flex flex-wrap gap-1.5">
          ${areas.map(a => `<span class="text-[10px] font-bold px-1.5 py-0.5 rounded ${areaColors[a]||''}">${a}</span>`).join('')}
        </div>
        ${hasAlerta ? `<p class="text-[10px] text-[#cd5055] font-semibold mt-1">${exps.find(e=>e.tiene_alerta)?.alerta_msg || ''}</p>` : ''}
      </td>
      <td class="px-4 py-3.5">
        <span class="inline-flex items-center gap-1 text-[10px] font-bold px-2 py-0.5 rounded-full bg-[#256386]/10 text-[#256386]">
          <span class="material-symbols-outlined text-[11px]">link</span>
          Causa judicial
        </span>
      </td>
      ${showAbogado ? `
      <td class="px-4 py-3.5">
        ${abogados.length === 1
          ? `<span class="text-xs text-[#1b3a5c]">${abogados[0].replace(/^Dr\. |^Dra\. /,'')}</span>`
          : abogados.map(a => `<p class="text-[10px] text-[#4f6080]">${a.replace(/^Dr\. |^Dra\. /,'')}</p>`).join('')
        }
      </td>` : ''}
      <td class="px-4 py-3.5">
        ${SACO_UI.estadoBadge(expPrincipal.estado, expPrincipal.estadoLabel || expPrincipal.estado.replace(/_/g,' '))}
      </td>
      <td class="px-4 py-3.5 text-xs text-[#4f6080]">${expPrincipal.fecha_recepcion || ''}</td>
      <td class="px-4 py-3.5 text-right">
        <button onclick="event.stopPropagation();verTodoCausa('${nc.replace(/'/g, "\\'")}')"
          class="text-[11px] font-bold text-[#256386] hover:underline">
          Ver todo
        </button>
      </td>
    </tr>`;

  if (expanded) {
    exps.forEach((exp, i) => {
      html += renderExpedienteRow(exp, true, i === exps.length - 1, showAbogado);
    });
  }

  return html;
}

// ── Fila de expediente (suelto o hijo de causa) ────────────────────────────
function renderExpedienteRow(e, isChild = false, isLast = false, showAbogado = false) {
  const sinCausa    = !e.numero_causa || e.numero_causa === null || e.numero_causa.trim() === '' || e.numero_causa.trim().toUpperCase() === 'SS SOFSE';
  const nombreCorto = (e.abogado || '').replace(/^Dr\. |^Dra\. /, '');
  const esPrincipal = isChild && e.es_principal === true;

  const trClass = isChild
    ? `child-row cursor-pointer border-l-4 ${esPrincipal ? 'border-emerald-400/60' : 'border-[#256386]/10'}`
    : 'exp-row cursor-pointer';

  const tdGs = esPrincipal
    ? 'style="background: linear-gradient(to right, rgba(209,250,229,0.5), rgba(236,253,245,0.35));"'
    : '';

  return `
    <tr class="${trClass}" onclick="verDetalle('${e.id}')">
      <td class="px-4 py-3.5 relative ${isChild ? 'pl-8' : ''}" ${tdGs}>
        ${isChild ? `
          <div class="absolute left-4 top-0 bottom-0 w-px bg-[#bcc0c9]" ${isLast ? 'style="bottom:50%"' : ''}></div>
          <div class="absolute left-4 top-1/2 w-3.5 h-px bg-[#bcc0c9]"></div>
          <div class="w-6 h-6 flex items-center justify-center relative ml-3">
            ${e.tiene_alerta
              ? `<span class="material-symbols-outlined text-[#cd5055] text-[16px]" style="font-variation-settings:'FILL' 1;">warning</span>`
              : `<span class="material-symbols-outlined text-[#4f6080] text-[16px]">description</span>`
            }
          </div>` : `
          <div class="w-8 h-8 flex items-center justify-center rounded-lg ${e.tiene_alerta ? 'bg-[#fee2e2]' : esPrincipal ? 'bg-emerald-100/80' : 'bg-[#f0f7f8]'}">
            ${e.tiene_alerta
              ? `<span class="material-symbols-outlined text-[#cd5055] text-[18px]" style="font-variation-settings:'FILL' 1;">warning</span>`
              : esPrincipal
                ? `<span class="material-symbols-outlined text-emerald-600 text-[18px]" style="font-variation-settings:'FILL' 1;">hub</span>`
                : `<span class="material-symbols-outlined text-[#4f6080] text-[18px]">description</span>`
            }
          </div>`}
      </td>
      <td class="px-4 py-3.5" ${tdGs}>
        <div class="flex flex-col gap-0.5">
          <span class="font-mono text-xs font-bold text-[#1b3a5c]">${e.id}</span>
          ${esPrincipal ? `
            <span class="inline-flex items-center gap-1 text-[9px] font-bold px-1.5 py-0.5 rounded-full mt-0.5 w-fit bg-emerald-100 text-emerald-700 border border-emerald-200/60">
              <span class="material-symbols-outlined text-[10px]">hub</span>
              Principal · PJN
            </span>` : ''}
          ${sinCausa && !isChild ? `
            <span class="mt-0.5 text-[9px] font-bold text-[#4f6080] flex items-center gap-0.5">
              <span class="material-symbols-outlined text-[11px]">folder_off</span>
              Sin causa
            </span>` : ''}
        </div>
      </td>
      <td class="px-4 py-3.5 max-w-xs" ${tdGs}>
        <p class="text-sm font-semibold text-[#1b3a5c] line-clamp-2 leading-snug">${e.caratula}</p>
        <p class="font-mono text-[10px] text-[#4f6080] mt-0.5">${e.numero_causa||''}</p>
        ${e.tiene_alerta ? `<p class="text-[10px] text-[#cd5055] font-semibold mt-1">${e.alerta_msg}</p>` : ''}
      </td>
      <td class="px-4 py-3.5" ${tdGs}>
        <span class="text-[10px] px-1.5 py-0.5 rounded font-bold w-fit ${areaColors[e.area]||''}">${e.area}</span>
      </td>
      <td class="px-4 py-3.5 text-xs text-[#4f6080] font-medium" ${tdGs}>${(e.tipo||'').replace(/_/g,' ')}</td>
      ${showAbogado ? `
      <td class="px-4 py-3.5" ${tdGs}>
        <span class="text-xs text-[#1b3a5c]">${nombreCorto}</span>
      </td>` : ''}
      <td class="px-4 py-3.5" ${tdGs}>${SACO_UI.estadoBadge(e.estado, (e.estadoLabel || e.estado.replace(/_/g,' ')))}</td>
      <td class="px-4 py-3.5 text-xs text-[#4f6080]" ${tdGs}>${e.fecha_recepcion}</td>
      <td class="px-4 py-3.5 text-right">
        <div class="relative inline-block" onclick="event.stopPropagation()">
          <button onclick="toggleMenu('menu-${e.id}', this)"
            class="w-7 h-7 flex items-center justify-center rounded-lg hover:bg-[#e2eff5] transition-colors text-[#4f6080]">
            <span class="material-symbols-outlined text-[18px]">more_vert</span>
          </button>
        </div>
      </td>
    </tr>`;
}

function toggleMenu(id, btn) {
  document.querySelectorAll('[id^="menu-"]').forEach(m => m.remove());

  const exp = window.SACO.getExpedienteById(id.replace('menu-', ''));
  const sinCausa = !exp?.numero_causa || exp.numero_causa.trim() === '' || exp.numero_causa.trim().toUpperCase() === 'SS SOFSE';

  const rect = btn.getBoundingClientRect();
  const menu = document.createElement('div');
  menu.id = id;
  menu.className = 'fixed z-[200] bg-white border border-[#e5e7eb] rounded-xl shadow-lg py-1 min-w-[160px]';
  menu.style.top  = (rect.bottom + 4) + 'px';
  menu.style.left = (rect.right - 160) + 'px';

  const expId = id.replace('menu-', '');
  menu.innerHTML = `
    <button onclick="verDetalle('${expId}')"
      class="w-full text-left px-4 py-2.5 text-sm text-[#1b3a5c] hover:bg-[#f0f7f8] flex items-center gap-2.5 transition-colors">
      <span class="material-symbols-outlined text-[16px] text-[#4f6080]">open_in_new</span>
      Visualizar
    </button>
    ${sinCausa ? `
    <button onclick="abrirModalAgrupar('${expId}')"
      class="w-full text-left px-4 py-2.5 text-sm text-[#1b3a5c] hover:bg-[#f0f7f8] flex items-center gap-2.5 transition-colors">
      <span class="material-symbols-outlined text-[16px] text-[#4f6080]">folder_open</span>
      Agrupar a causa
    </button>` : `
    <button onclick="desagrupar('${expId}')"
      class="w-full text-left px-4 py-2.5 text-sm text-[#1b3a5c] hover:bg-[#f0f7f8] flex items-center gap-2.5 transition-colors">
      <span class="material-symbols-outlined text-[16px] text-[#4f6080]">link_off</span>
      Desagrupar
    </button>`}
    ${puedeReasignar() ? `
    <div class="border-t border-[#f0f7f8] my-1"></div>
    <button onclick="SACO_UI.showToast('Reasignación iniciada.','info')"
      class="w-full text-left px-4 py-2.5 text-sm text-[#1b3a5c] hover:bg-[#f0f7f8] flex items-center gap-2.5 transition-colors">
      <span class="material-symbols-outlined text-[16px] text-[#4f6080]">forward</span>
      Reasignar
    </button>` : ''}`;

  document.body.appendChild(menu);

  setTimeout(() => document.addEventListener('click', function h() {
    menu.remove();
    document.removeEventListener('click', h);
  }), 50);
}

function puedeReasignar() {
  return SACO_UI.puedeReasignar();
}

function verDetalle(id) {
  window.location.href = `detalle-expediente.html?id=${id}`;
}

function verTodoCausa(nc) {
  window.location.href = `causa-detalle.html?causa=${encodeURIComponent(nc)}`;
}

// ─────────────────────────────────────────────────────────────────────────────
// TOGGLE CAUSA
// ─────────────────────────────────────────────────────────────────────────────
function toggleCausa(nc) {
  if (expandedCausas.has(nc)) expandedCausas.delete(nc);
  else expandedCausas.add(nc);
  renderTabla(allItems);
}

function expandAll() {
  allItems.forEach(item => {
    if (item.kind === 'causa') expandedCausas.add(item.numeroCausa);
  });
  renderTabla(allItems);
}

function collapseAll() {
  expandedCausas.clear();
  renderTabla(allItems);
}

// ─────────────────────────────────────────────────────────────────────────────
// MODAL: AGRUPAR
// ─────────────────────────────────────────────────────────────────────────────
function abrirModalAgrupar(expId) {
  const exp = window.SACO.getExpedienteById(expId);
  if (!exp) return;

  const todasLasCausas = [...new Set(
    window.SACO.EXPEDIENTES_ABOGADO
      .filter(e => e.numero_causa && e.numero_causa.trim() && e.id !== expId)
      .map(e => e.numero_causa.trim())
  )].sort();

  SACO_UI.showModal('Agrupar a Causa', `
    <div class="space-y-4">
      <div class="p-3 bg-[#f0f7f8] rounded-xl">
        <p class="text-xs font-bold text-[#1b3a5c]">${exp.id}</p>
        <p class="text-xs text-[#4f6080] mt-0.5 line-clamp-2">${exp.caratula}</p>
      </div>
      <div>
        <label class="block text-xs font-bold text-[#4f6080] uppercase tracking-wider mb-2">N° de Causa Judicial</label>
        <input id="modal-causa-input" oninput="onModalCausaInput(this.value)"
          class="w-full bg-[#f0f7f8] border border-[#bcc0c9] rounded-lg py-3 px-4 text-sm font-mono focus:ring-2 focus:ring-[#256386]/20 focus:outline-none"
          placeholder="FSM-XXXXX/2026"/>
        <p class="text-[10px] text-[#4f6080] mt-1">Ingresá el número o seleccioná una causa existente.</p>
      </div>
      ${todasLasCausas.length ? `
        <div>
          <p class="text-[10px] font-bold text-[#4f6080] uppercase tracking-wider mb-2">Causas existentes en el sistema</p>
          <div class="space-y-1.5 max-h-40 overflow-y-auto">
            ${todasLasCausas.map(nc => {
              const expsGrupo = window.SACO.EXPEDIENTES_ABOGADO.filter(e => (e.numero_causa||'').trim() === nc);
              const areas = [...new Set(expsGrupo.map(e => e.area))].join(' · ');
              return `
                <button onclick="document.getElementById('modal-causa-input').value='${nc}';onModalCausaInput('${nc}')"
                  class="w-full text-left p-3 bg-[#f0f7f8] rounded-lg hover:bg-[#e2eff5] transition-colors">
                  <div class="flex items-center justify-between">
                    <div class="flex items-center gap-2">
                      <span class="material-symbols-outlined text-[#256386] text-[14px]" style="font-variation-settings:'FILL' 1;">folder</span>
                      <span class="font-mono text-xs font-bold text-[#256386]">${nc}</span>
                    </div>
                    <div class="flex items-center gap-2">
                      <span class="text-[10px] text-[#4f6080]">${expsGrupo.length} exp.</span>
                      <span class="text-[10px] text-[#4f6080]">${areas}</span>
                    </div>
                  </div>
                </button>`;
            }).join('')}
          </div>
        </div>` : `
        <div class="p-3 bg-[#f0f7f8] rounded-xl text-center">
          <p class="text-xs text-[#4f6080]">No hay causas existentes. Ingresá un número nuevo para crear la primera causa.</p>
        </div>`}
    </div>`,
    `<button onclick="SACO_UI.closeModal()" class="px-4 py-2 text-sm font-semibold text-[#4f6080] hover:bg-surface-container rounded-lg">Cancelar</button>
     <button onclick="confirmarAgrupar('${expId}')" class="px-6 py-2 bg-[#256386] hover:bg-[#1d4e6b] text-white text-sm font-bold rounded-lg">Agrupar</button>`
  );
}

function onModalCausaInput(val) {}

function confirmarAgrupar(expId) {
  const nc = (document.getElementById('modal-causa-input').value || '').trim();
  if (!nc) { SACO_UI.showToast('Ingresá un número de causa.', 'warn'); return; }

  const exp = window.SACO.getExpedienteById(expId);
  if (!exp) return;

  const exps = window.SACO.EXPEDIENTES_ABOGADO;
  const yaExistePrincipal = exps.some(e =>
    e.id !== expId &&
    (e.numero_causa||'').trim() === nc &&
    e.es_principal === true
  );

  exp.numero_causa = nc;
  exp.es_principal = !yaExistePrincipal;

  SACO_UI.closeModal();
  applyFilters();
  if (!yaExistePrincipal) {
    SACO_UI.showToast(`${expId} agrupado como expediente principal de ${nc}.`, 'success');
  } else {
    SACO_UI.showToast(`${expId} agrupado a causa ${nc}.`, 'success');
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// DESAGRUPAR
// ─────────────────────────────────────────────────────────────────────────────
function desagrupar(expId) {
  const exp = window.SACO.getExpedienteById(expId);
  if (!exp) return;
  SACO_UI.showModal('Desagrupar expediente', `
    <div class="space-y-3">
      <div class="p-3 bg-[#f0f7f8] rounded-xl">
        <p class="text-xs font-bold text-[#1b3a5c]">${exp.id}</p>
        <p class="text-xs text-[#4f6080] mt-0.5 line-clamp-2">${exp.caratula}</p>
      </div>
      <p class="text-sm text-[#4f6080]">Este expediente quedará suelto y podrá reagruparse a otra causa.</p>
      <p class="text-xs font-bold text-[#cd5055]">N° de causa actual: ${exp.numero_causa}</p>
    </div>`,
    `<button onclick="SACO_UI.closeModal()"
      class="px-4 py-2 text-sm font-semibold text-[#4f6080] hover:bg-surface-container rounded-lg">
      Cancelar
    </button>
    <button onclick="confirmarDesagrupar('${expId}')"
      class="px-6 py-2 bg-[#cd5055] hover:bg-red-700 text-white text-sm font-bold rounded-lg">
      Desagrupar
    </button>`
  );
}

function confirmarDesagrupar(expId) {
  const exp = window.SACO.getExpedienteById(expId);
  if (!exp) return;
  const causaAnterior = exp.numero_causa;
  const eraPrincipal  = exp.es_principal;

  exp.numero_causa = null;
  exp.es_principal = false;

  if (eraPrincipal) {
    const siguiente = window.SACO.EXPEDIENTES_ABOGADO.find(e =>
      e.id !== expId &&
      (e.numero_causa||'').trim() === causaAnterior
    );
    if (siguiente) {
      siguiente.es_principal = true;
      SACO_UI.closeModal();
      applyFilters();
      SACO_UI.showToast(`${expId} desagrupado. ${siguiente.id} es ahora el expediente principal.`, 'info');
      return;
    }
  }

  SACO_UI.closeModal();
  applyFilters();
  SACO_UI.showToast(`${expId} desagrupado de ${causaAnterior}.`, 'info');
}

// ─────────────────────────────────────────────────────────────────────────────
// SYNC
// ─────────────────────────────────────────────────────────────────────────────
SACO_SYNC.syncListen(({ type, payload }) => {
  if (type === 'EXPEDIENTE_ASIGNADO' || type === 'ESTADO_CAMBIADO') {
    applyFilters();
    SACO_UI.showToast('Bandeja actualizada desde otra pestaña.', 'info');
  }
  if (type === 'USUARIO_CAMBIADO') {
    if (payload && payload.usuario) window.SACO.CURRENT_USER = payload.usuario;
    document.getElementById('sidebar-mount').innerHTML = SACO_UI.renderSidebar('bandeja-area');
    if (payload && payload.usuario) {
      SACO_UI.updateUserPill(payload.usuario);
      // Re-aplicar pre-filtro de área al cambiar usuario
      const nuevoArea = payload.usuario.area;
      document.getElementById('f-area').value = nuevoArea || '';
    }
    applyFilters();
  }
});

// ─────────────────────────────────────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────────────────────────────────────
poblarFiltroTipo();
poblarFiltroEstado();
poblarFiltroLetrado();

// Pre-establecer filtro de área según el usuario actual
(function preSetAreaFilter() {
  const u = window.SACO.CURRENT_USER;
  if (u && u.area) {
    document.getElementById('f-area').value = u.area;
  }
})();

applyFilters();

// Aplicar offset sidebar
(function applyInitialSidebarOffset() {
  try {
    const collapsed = localStorage.getItem('saco_sidebar_collapsed') === '1';
    const ml = collapsed ? '52px' : '256px';
    const main   = document.getElementById('main-content');
    const topbar = document.getElementById('topbar-content');
    if (main)   main.style.marginLeft = ml;
    if (topbar) topbar.style.left     = ml;
  } catch(e) {}
})();
</script>
</body>
</html>
